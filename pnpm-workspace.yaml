packages:
  - "packages/*"
  - "apps/*"
overrides:
  # Force the patched esbuild (GHSA-gv7w-rqvm-qjhr); only pulled transitively via tsx.
  esbuild@<0.28.1: ">=0.28.1"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  cpu-features: true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - nodemailer@8.0.10
  - '@hocuspocus/common@4.1.1'
  - '@hocuspocus/server@4.1.1'
  - '@hocuspocus/provider@4.1.1'
