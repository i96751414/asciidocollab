# Custom PDF theme for the theme-fonts reference-parity fixture.
#
# It extends the engine's built-in default theme (so every unspecified key inherits a complete, valid
# base) and layers a distinctive brand on top: a branded heading typeface registered in the font
# catalogue, an accent heading colour, and a warm page background. Both the in-app export and the
# external reference build consume THIS file, so any divergence in how the theme is honoured shows up
# as a content / layout / colour difference in the compared PDFs.
extends: default
font:
  catalog:
    merge: true
    Brand Mono:
      normal: mplus1mn-regular-subset.ttf
      bold: mplus1mn-bold-subset.ttf
      italic: mplus1mn-italic-subset.ttf
      bold_italic: mplus1mn-bold_italic-subset.ttf
page:
  background-color: FCFBF7
base:
  font-color: '222222'
heading:
  font-family: Brand Mono
  font-color: '2A5CAA'
title-page:
  title:
    font-family: Brand Mono
    font-color: '2A5CAA'
