<svg id="parity-mermaid" width="100%" xmlns="http://www.w3.org/2000/svg" class="flowchart" style="max-width: 483px;" viewBox="0 0 483 160" role="graphics-document document" aria-roledescription="flowchart-v2"><style>#parity-mermaid{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#parity-mermaid .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#parity-mermaid .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#parity-mermaid .error-icon{fill:#552222;}#parity-mermaid .error-text{fill:#552222;stroke:#552222;}#parity-mermaid .edge-thickness-normal{stroke-width:1px;}#parity-mermaid .edge-thickness-thick{stroke-width:3.5px;}#parity-mermaid .edge-pattern-solid{stroke-dasharray:0;}#parity-mermaid .edge-thickness-invisible{stroke-width:0;fill:none;}#parity-mermaid .edge-pattern-dashed{stroke-dasharray:3;}#parity-mermaid .edge-pattern-dotted{stroke-dasharray:2;}#parity-mermaid .marker{fill:#333333;stroke:#333333;}#parity-mermaid .marker.cross{stroke:#333333;}#parity-mermaid svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#parity-mermaid p{margin:0;}#parity-mermaid .label{font-family:"trebuchet ms",verdana,arial,sans-serif;color:#333;}#parity-mermaid .cluster-label text{fill:#333;}#parity-mermaid .cluster-label span{color:#333;}#parity-mermaid .cluster-label span p{background-color:transparent;}#parity-mermaid .label text,#parity-mermaid span{fill:#333;color:#333;}#parity-mermaid .node rect,#parity-mermaid .node circle,#parity-mermaid .node ellipse,#parity-mermaid .node polygon,#parity-mermaid .node path{fill:#ECECFF;stroke:#9370DB;stroke-width:1px;}#parity-mermaid .rough-node .label text,#parity-mermaid .node .label text,#parity-mermaid .image-shape .label,#parity-mermaid .icon-shape .label{text-anchor:middle;}#parity-mermaid .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#parity-mermaid .rough-node .label,#parity-mermaid .node .label,#parity-mermaid .image-shape .label,#parity-mermaid .icon-shape .label{text-align:center;}#parity-mermaid .node.clickable{cursor:pointer;}#parity-mermaid .root .anchor path{fill:#333333!important;stroke-width:0;stroke:#333333;}#parity-mermaid .arrowheadPath{fill:#333333;}#parity-mermaid .edgePath .path{stroke:#333333;stroke-width:1px;}#parity-mermaid .flowchart-link{stroke:#333333;fill:none;}#parity-mermaid .edgeLabel{background-color:rgba(232,232,232, 0.8);text-align:center;}#parity-mermaid .edgeLabel p{background-color:rgba(232,232,232, 0.8);}#parity-mermaid .edgeLabel rect{opacity:0.5;background-color:rgba(232,232,232, 0.8);fill:rgba(232,232,232, 0.8);}#parity-mermaid .labelBkg{background-color:rgba(232, 232, 232, 0.5);}#parity-mermaid .cluster rect{fill:#ffffde;stroke:#aaaa33;stroke-width:1px;}#parity-mermaid .cluster text{fill:#333;}#parity-mermaid .cluster span{color:#333;}#parity-mermaid div.mermaidTooltip{position:absolute;text-align:center;max-width:200px;padding:2px;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:12px;background:hsl(80, 100%, 96.2745098039%);border:1px solid #aaaa33;border-radius:2px;pointer-events:none;z-index:100;}#parity-mermaid .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#333;}#parity-mermaid rect.text{fill:none;stroke-width:0;}#parity-mermaid .icon-shape,#parity-mermaid .image-shape{background-color:rgba(232,232,232, 0.8);text-align:center;}#parity-mermaid .icon-shape p,#parity-mermaid .image-shape p{background-color:rgba(232,232,232, 0.8);padding:2px;}#parity-mermaid .icon-shape .label rect,#parity-mermaid .image-shape .label rect{opacity:0.5;background-color:rgba(232,232,232, 0.8);fill:rgba(232,232,232, 0.8);}#parity-mermaid .label-icon{display:inline-block;height:1em;overflow:visible;vertical-align:-0.125em;}#parity-mermai