# Development environment overrides

env: development

api:
  port: 4000
  host: 0.0.0.0
  trustProxy: false
  httpsRedirect: false
  frontendUrl: "http://localhost:3000"

auth:
  session:
    secure: false
    cookie:
      sameSite: strict
  # Generous rate limits for local development and testing
  login:
    rateLimitMax: 1000
    rateLimitWindow: 60000
  registration:
    rateLimitMax: 1000
    rateLimitWindow: 60000
  passwordReset:
    rateLimitMax: 1000
    rateLimitWindow: 60000
  passwordChange:
    rateLimitMax: 1000
    rateLimitWindow: 60000
