name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for the GITHUB_TOKEN across every job (CWE-275). Jobs that
# need more must opt in explicitly with their own `permissions:` block.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Fast feedback: lint, type-check, architecture guard ────────────────────
  quality:
    name: Quality (lint · types · architecture)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # Don't leave the checkout token in .git/config where an uploaded artifact could leak it.
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (generate declaration files)
        run: pnpm -r build

      - name: Lint
        run: npx eslint .

      - name: Type-check — shared
        run: npx tsc -p packages/shared/tsconfig.json --noEmit

      - name: Type-check — domain
        run: npx tsc -p packages/domain/tsconfig.json --noEmit

      - name: Type-check — infrastructure
        run: npx tsc -p packages/infrastructure/tsconfig.json --noEmit

      - name: Type-check — API
        run: npx tsc -p apps/api/tsconfig.json --noEmit

      - name: Type-check — collab
        run: npx tsc -p apps/collab/tsconfig.json --noEmit

      - name: Type-check — web
        run: npx tsc -p apps/web/tsconfig.json --noEmit

      - name: Architecture guard (fresh-onion)
        run: npx fresh-onion

      - name: Security audit (high+ severity)
        run: pnpm audit --audit-level=high

      # Dead-code / unused-dependency report. Non-gating for now: this monorepo's built-package
      # (dist entry) layout and dynamic (build-time) deps produce known false positives that need
      # curation before knip can block. Tracked as a follow-up.
      # `|| true` keeps the report informational AND exits 0, so knip's normal "found issues" exit 1
      # does not surface a misleading "Process completed with exit code 1" failure annotation on the
      # otherwise-green Quality job (which is what `continue-on-error` alone left behind).
      - name: Dead-code report (knip, non-gating)
        run: npx knip || echo "::notice::knip reported findings (non-gating — see log for details)"

  # ── Domain unit tests with coverage ────────────────────────────────────────
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v5
        with:
          # Don't leave the checkout token in .git/config where an uploaded artifact could leak it.
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (generate Prisma client + declaration files)
        run: pnpm -r build

      - name: Asciidoc-core unit tests with coverage
        working-directory: packages/asciidoc-core
        run: npx jest --coverage --coverageReporters=text lcov

      - name: Shared unit tests with coverage
        working-directory: packages/shared
        run: npx jest --coverage --coverageReporters=text lcov

      - name: Domain unit tests with coverage
        working-directory: packages/domain
        run: npx jest --coverage --coverageReporters=text lcov

      - name: API unit tests with coverage
        working-directory: apps/api
        run: npx jest --coverage --coverageReporters=text lcov

      - name: Collab unit tests with coverage
        working-directory: apps/collab
        # The collab suite runs under ESM (ts-jest emits ESM; `jest.unstable_mockModule` + top-level
        # `await import()` need it), so it requires --experimental-vm-modules — exactly what the
        # package's own `test` script sets. Without it the ESM specs silently fail to run and drag
        # coverage under threshold.
        run: NODE_OPTIONS=--experimental-vm-modules npx jest --coverage --coverageReporters=text lcov

      - name: Web unit tests with coverage
        working-directory: apps/web
        run: npx jest --coverage --coverageReporters=text lcov

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            packages/asciidoc-core/coverage/
            packages/shared/coverage/
            packages/domain/coverage/
            apps/api/coverage/
            apps/collab/coverage/
            apps/web/coverage/
          retention-days: 7

  # ── Infrastructure integration tests (testcontainers manages its own DB) ───
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v5
        with:
          # Don't leave the checkout token in .git/config where an uploaded artifact could leak it.
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Infrastructure integration tests
        run: pnpm --filter @asciidocollab/infrastructure test
        env:
          # Testcontainers uses Docker — make sure it's available and doesn't time out
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  # ── End-to-end tests (full stack) ──────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit, integration]

    steps:
      - uses: actions/checkout@v5
        with:
          # Don't leave the checkout token in .git/config where an uploaded artifact could leak it.
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages (Prisma client + declaration files)
        run: pnpm --filter '!@asciidocollab/web' -r build

      - name: Install Playwright browsers
        run: pnpm --filter @asciidocollab/web exec playwright install --with-deps chromium

      - name: Start PostgreSQL and Mailpit
        run: docker compose -f docker-compose.dev.yml up -d postgres mailpit --wait

      - name: Apply database schema (force-reset for a clean slate)
        run: pnpm --filter @asciidocollab/db exec prisma db push --force-reset
        env:
          ASCIIDOCOLLAB_DATABASE_URL: postgresql://asciidocollab:asciidocollab@localhost:5432/asciidocollab

      - name: Start API server
        run: nohup pnpm --filter @asciidocollab/api start &
        env:
          NODE_ENV: test
          ASCIIDOCOLLAB_DATABASE_URL: postgresql://asciidocollab:asciidocollab@localhost:5432/asciidocollab
          ASCIIDOCOLLAB_API_PORT: 4000
          ASCIIDOCOLLAB_API_HOST: 0.0.0.0
          ASCIIDOCOLLAB_API_FRONTEND_URL: http://localhost:3000
          ASCIIDOCOLLAB_API_CORS_ORIGINS: http://localhost:3000
          # Internal edit endpoint the API calls to rewrite references in LIVE collab documents
          # (US12). Must match the collab server's internalEditPort below; set explicitly so the
          # round-trip never depends on two services happening to share the same default.
          ASCIIDOCOLLAB_COLLAB_EDIT_URL: http://127.0.0.1:4003
          # Shared with the collab server so its write-back is visible to GET /content.
          ASCIIDOCOLLAB_STORAGE_PATH: ${{ github.workspace }}/.e2e-storage
          ASCIIDOCOLLAB_AUTH_SESSION_SECRET: ${{ secrets.CI_SESSION_SECRET || 'ci-test-session-secret-for-e2e-tests' }}
          # Must be a base64-encoded 32-byte string (AES-256). Value = base64("ci-test-encryption-key-32bytes!!")
          ASCIIDOCOLLAB_AUTH_SESSION_ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY || 'Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzISE=' }}
          ASCIIDOCOLLAB_AUTH_COOKIE_SECURE: 'false'
          ASCIIDOCOLLAB_AUTH_EMAIL_PROVIDER: smtp
          ASCIIDOCOLLAB_AUTH_EMAIL_ENABLED: 'true'
          ASCIIDOCOLLAB_AUTH_EMAIL_FROM: noreply@asciidocollab.local
          ASCIIDOCOLLAB_AUTH_SMTP_HOST: localhost
          ASCIIDOCOLLAB_AUTH_SMTP_PORT: 1025
          # Raise conservative production rate limits for CI: 12 parallel workers
          # all share the same localhost IP, so defaults are too low.
          ASCIIDOCOLLAB_ADMIN_INVITE_RATE_LIMIT_MAX: 500
          ASCIIDOCOLLAB_ADMIN_OPEN_REGISTRATION_RATE_LIMIT_MAX: 10000
          ASCIIDOCOLLAB_AUTH_EMAIL_VERIFICATION_RATE_LIMIT_MAX: 500
          ASCIIDOCOLLAB_AUTH_INVITATION_RATE_LIMIT_MAX: 500
          # Outline / cross-document suites set a project's main file many times; raise the 50/hour default.
          ASCIIDOCOLLAB_PROJECT_MAIN_FILE_RATE_LIMIT_MAX: 10000
          # Editor-open hits GET .../collab per document; 12 workers share one IP, so raise the 600/hour default.
          ASCIIDOCOLLAB_PROJECT_FILE_CONTENT_RATE_LIMIT_MAX: 10000

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          until curl -sf http://localhost:4000/health; do sleep 1; done
          echo "API is ready."

      # Regression guard: the collab server must REFUSE to start when its storage root
      # differs from the API's (the dev.sh data-loss bug). The API above uses
      # .e2e-storage; this starts collab with a throwaway root and asserts it fails fast.
      - name: Assert storage-consistency guard (collab refuses divergent storage)
        run: bash scripts/system-tests/assert-storage-guard.sh
        env:
          ASCIIDOCOLLAB_DATABASE_URL: postgresql://asciidocollab:asciidocollab@localhost:5432/asciidocollab
          ASCIIDOCOLLAB_COLLAB_API_INTERNAL_URL: http://127.0.0.1:4001

      - name: Start collaboration server
        run: nohup pnpm --filter @asciidocollab/collab start &
        env:
          ASCIIDOCOLLAB_DATABASE_URL: postgresql://asciidocollab:asciidocollab@localhost:5432/asciidocollab
          ASCIIDOCOLLAB_COLLAB_PORT: 4002
          ASCIIDOCOLLAB_COLLAB_API_INTERNAL_URL: http://127.0.0.1:4001
          # Internal edit server the API reaches at ASCIIDOCOLLAB_COLLAB_EDIT_URL above (US12).
          ASCIIDOCOLLAB_COLLAB_INTERNAL_EDIT_HOST: 127.0.0.1
          ASCIIDOCOLLAB_COLLAB_INTERNAL_EDIT_PORT: 4003
          ASCIIDOCOLLAB_STORAGE_PATH: ${{ github.workspace }}/.e2e-storage
          # Empty allowlist disables the Origin check for the CI stack.
          ASCIIDOCOLLAB_COLLAB_ALLOWED_ORIGINS: ''

      - name: Wait for collab server to be ready
        run: |
          echo "Waiting for collab server..."
          until (exec 3<>/dev/tcp/127.0.0.1/4002) 2>/dev/null; do sleep 1; done
          echo "Collab server is ready."

      - name: Build Next.js
        run: pnpm --filter @asciidocollab/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_COLLAB_URL: ws://localhost:4002

      - name: Start Next.js
        run: nohup pnpm --filter @asciidocollab/web start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_COLLAB_URL: ws://localhost:4002
          INTERNAL_API_URL: http://localhost:4000

      - name: Wait for web to be ready
        run: |
          echo "Waiting for web..."
          until curl -sf http://localhost:3000; do sleep 1; done
          echo "Web is ready."

      - name: Run Playwright E2E tests
        run: pnpm --filter @asciidocollab/web e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_WEB_URL: http://localhost:3000
          NEXT_PUBLIC_COLLAB_URL: ws://localhost:4002
          MAILPIT_URL: http://localhost:8025

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Security scanning: SAST · secrets · dependency CVEs · workflow hardening ─
  security:
    name: Security scan (SAST · secrets · deps · workflows)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0            # full history for secret scanning
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Semgrep and zizmor
        run: pip install --upgrade semgrep zizmor

      # Registry packs + first-party rules in .semgrep.yml (path excludes in .semgrepignore). Same
      # command as the `pnpm semgrep` script so local runs reproduce CI exactly.
      - name: Semgrep (SAST — path traversal, weak crypto, sanitization, …)
        run: semgrep --config p/security-audit --config p/owasp-top-ten --config .semgrep.yml --error --quiet .

      - name: zizmor (GitHub Actions workflow hardening)
        run: zizmor .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}

      # Resolve the latest tag with `gh` (pre-installed, authenticated via GH_TOKEN) rather than an
      # unauthenticated `curl | grep`, which silently returns exit 1 under `bash -e` when the GitHub
      # API rate-limits the shared runner IP (the response has no `tag_name` to match).
      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GL=$(gh release view --repo gitleaks/gitleaks --json tagName -q .tagName)
          GL=${GL#v}
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks

      - name: gitleaks (secret scan across full history)
        run: gitleaks git --redact --verbose

      - name: Install OSV-Scanner
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OSV=$(gh release view --repo google/osv-scanner --json tagName -q .tagName)
          OSV=${OSV#v}
          curl -fsSL -o /usr/local/bin/osv-scanner "https://github.com/google/osv-scanner/releases/download/v${OSV}/osv-scanner_linux_amd64"
          chmod +x /usr/local/bin/osv-scanner

      # Broader dependency-CVE coverage than `pnpm audit`. Gated at High+ (CVSS ≥ 7.0) to match the
      # repo's existing `pnpm audit --audit-level=high` policy; medium/low transitive advisories are
      # reported but non-blocking.
      - name: OSV-Scanner (dependency CVEs, gate at High+)
        run: |
          osv-scanner scan --lockfile=pnpm-lock.yaml --format=json > osv.json || true
          osv-scanner scan --lockfile=pnpm-lock.yaml || true   # human-readable table in the log
          HIGH=$(jq '[.results[].packages[].groups[].max_severity | select(. != "") | tonumber] | map(select(. >= 7.0)) | length' osv.json)
          echo "High+ (CVSS >= 7.0) advisories: $HIGH"
          test "$HIGH" -eq 0
