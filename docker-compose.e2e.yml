# ─────────────────────────────────────────────────────────────────────────────
# Isolated stack for local end-to-end tests.
#
# Everything here is deliberately separate from the development stack
# (docker-compose.dev.yml) so running the e2e suite never touches your dev
# containers or data:
#   - distinct Compose project name  (asciidocollab-e2e)
#   - distinct host ports            (5433 / 1126 / 8126 instead of 5432 / 1025 / 8025)
#   - a throwaway database           (no named volume — wiped on `down`)
#
# Driven by scripts/ci/e2e-local.sh, which also runs the API on :4100 and web on
# :3100. Because each run starts from a fresh, empty database, the suite only
# needs a plain `prisma db push` (no destructive `--force-reset`).
# ─────────────────────────────────────────────────────────────────────────────
name: asciidocollab-e2e

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: asciidocollab
      POSTGRES_PASSWORD: asciidocollab
      POSTGRES_DB: asciidocollab_e2e
    ports:
      - "5433:5432"
    # No volume on purpose: data lives in the container layer and is destroyed
    # on `docker compose down`, guaranteeing a clean database every run.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asciidocollab"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1126:1025"   # SMTP
      - "8126:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500
